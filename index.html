<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <title>Sign-up Form</title>
    </head>
    <body>
        <div class="illustration">
            <div class="illustration-sidebar">
                <img src="img/odin_logo.png" alt="Odin Logo">
                <h1>ODIN</h1>
            </div>
            <div class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/">Unsplash</a></div>
        </div>
        <main>
            <div class="presentation">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br/>Sign up now to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <form id="sign-up-form" action="https://httpbin.org/post" method="post">
                <legend>Let's do this!</legend>
                <div class="row">
                    <div class="input-layout">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="input-layout">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                </div>
                <div class="row">
                    <div class="input-layout">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="input-layout">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                </div>
                <div class="row">
                    <div class="input-layout">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="input-layout">
                        <label for="password_confirm">CONFIRM PASSWORD</label>
                        <input type="password" id="password_confirm" name="password_confirm" required>
                    </div>
                </div>
            </form>
            <div class="subform">
                <button type="submit" form="sign-up-form">Create Account</button>
                <p>Already have an account? <a href="">Log in</a></p>
            </div>
        </main>
    </body>
</html>
